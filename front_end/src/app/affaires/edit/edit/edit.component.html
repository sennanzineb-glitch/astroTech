<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h3 class="fw-bold mb-1">{{ isEdit ? "Modifier l'affaire" : "Nouvelle affaire" }}</h3>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a routerLink="/dashboard">Home</a></li>
        <li class="breadcrumb-item"><a routerLink="/affaires/list">Affaires</a></li>
        <li class="breadcrumb-item active">{{ isEdit ? "Modification" : "Création" }}</li>
      </ol>
    </nav>
  </div>
</div>

<div class="row">
  <div class="col-md-12">
    <!-- Progress Bar -->
    <div class="card mb-4" *ngIf="formReady">
      <div class="card-body py-3">
        <div class="d-flex justify-content-between position-relative" style="max-width: 600px; margin: 0 auto;">
          <div class="step-line" style="position: absolute; height: 2px; background: #eee; top: 15px; left: 0; right: 0; z-index: 1;"></div>
          <div class="step-line-active" [style.width]="isEdit ? (step === 1 ? '0%' : '100%') : (step === 1 ? '0%' : (step === 2 ? '50%' : '100%'))" style="position: absolute; height: 2px; background: var(--primary-color); top: 15px; left: 0; z-index: 2; transition: 0.3s;"></div>
          
          <div class="d-flex flex-column align-items-center" style="z-index: 3; width: 80px;">
            <div class="avatar-circle-sm" [class.bg-primary]="step >= 1" [class.bg-light]="step < 1" [class.text-white]="step >= 1">1</div>
            <span class="smaller fw-bold mt-1">Général</span>
          </div>
          <div class="d-flex flex-column align-items-center" style="z-index: 3; width: 80px;">
            <div class="avatar-circle-sm" [class.bg-primary]="step >= 2" [class.bg-light]="step < 2" [class.text-white]="step >= 2">2</div>
            <span class="smaller fw-bold mt-1">Détails</span>
          </div>
          <div *ngIf="!isEdit" class="d-flex flex-column align-items-center" style="z-index: 3; width: 80px;">
            <div class="avatar-circle-sm" [class.bg-primary]="step >= 3" [class.bg-light]="step < 3" [class.text-white]="step >= 3">3</div>
            <span class="smaller fw-bold mt-1">Référents</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 🔹 Étapes -->
    <div class="steps mb-4" *ngIf="formReady">
      <app-etape1 *ngIf="step === 1" [form]="formService.formStep1"></app-etape1>
      <app-etape2 *ngIf="step === 2" [form]="formService.formStep2"></app-etape2>
      <app-etape3 *ngIf="step === 3 && !isEdit" [form]="formService.formStep3"></app-etape3>
    </div>

    <!-- 🔹 Barre de Navigation Sticky -->
    <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded-3 shadow-sm sticky-bottom" style="bottom: 20px;">
        <button class="btn btn-secondary px-4" [routerLink]="['/affaires/list']">
          <i class="mdi mdi-close me-1"></i> Annuler
        </button>
        
        <div class="d-flex gap-2">
            <button class="btn btn-light border px-4" (click)="previousStep()" [disabled]="step === 1">
              <i class="mdi mdi-chevron-left me-1"></i> Précédent
            </button>
            <button *ngIf="(!isEdit && step < 3) || (isEdit && step < 2)" class="btn btn-primary px-4" (click)="nextStep()">
              Suivant <i class="mdi mdi-chevron-right ms-1"></i>
            </button>
            <button *ngIf="(!isEdit && step === 3) || (isEdit && step === 2)" class="btn btn-success px-4" (click)="submit()">
              <i class="mdi mdi-check me-1"></i> Sauvegarder
            </button>
        </div>
    </div>
  </div>
</div>
