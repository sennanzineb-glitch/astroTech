<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h3 class="fw-bold mb-1">{{ isEdit ? "Modifier le technicien" : "Nouveau technicien" }}</h3>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a routerLink="/dashboard">Home</a></li>
        <li class="breadcrumb-item"><a routerLink="/techniciens/list">Techniciens</a></li>
        <li class="breadcrumb-item active">{{ isEdit ? "Modification" : "Création" }}</li>
      </ol>
    </nav>
  </div>
</div>

<div class="row">
    <div class="col-lg-10 mx-auto">
        <form [formGroup]="technicienForm" class="card shadow-sm border-0 mb-4">
            <div class="card-body p-4">
                <h6 class="text-uppercase small fw-bold text-muted mb-4">Informations personnelles</h6>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small">Nom <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" formControlName="nom" placeholder="Nom">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small">Prénom <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" formControlName="prenom" placeholder="Prénom">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small">Date de naissance</label>
                        <input type="date" class="form-control" formControlName="dateNaissance">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold small">Spécialité <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" formControlName="specialite" placeholder="ex: Électricien, Peintre...">
                    </div>
                </div>

                <hr class="opacity-10 mb-4">
                <h6 class="text-uppercase small fw-bold text-muted mb-4">Contact & Sécurité</h6>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Téléphone <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" formControlName="telephone" placeholder="06 ...">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Email</label>
                        <input type="email" class="form-control" formControlName="email" placeholder="email@example.com">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Mot de passe <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input [type]="showPassword ? 'text' : 'password'" class="form-control" formControlName="pwd">
                            <button class="btn btn-outline-light border text-secondary" (click)="showPassword = !showPassword" type="button">
                                <i class="mdi" [ngClass]="showPassword ? 'mdi-eye-off' : 'mdi-eye'"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label fw-semibold small">Adresse</label>
                        <textarea class="form-control" formControlName="adresse" rows="2" placeholder="Adresse complète..."></textarea>
                    </div>
                </div>

                <hr class="opacity-10 mb-4">
                <h6 class="text-uppercase small fw-bold text-muted mb-4">Professionnel</h6>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Type de contrat</label>
                        <select class="form-select" formControlName="typeContrat">
                            <option value="">Sélectionner</option>
                            <option value="CDI">CDI</option>
                            <option value="CDD">CDD</option>
                            <option value="Freelance">Freelance</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Salaire</label>
                        <div class="input-group">
                            <input type="number" class="form-control" formControlName="salaire" step="0.01">
                            <span class="input-group-text bg-light smaller">€</span>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Statut</label>
                        <select class="form-select" formControlName="statut">
                            <option value="Actif">Actif</option>
                            <option value="Inactif">Inactif</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Expérience (années)</label>
                        <input type="number" class="form-control" formControlName="experience">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Zone d’intervention</label>
                        <input type="text" class="form-control" formControlName="zoneIntervention">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold small">Date d’embauche</label>
                        <input type="date" class="form-control" formControlName="dateEmbauche">
                    </div>
                </div>
            </div>

            <div class="card-footer bg-light border-0 p-3 d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary px-4" [routerLink]="['/techniciens/list']">Annuler</button>
                <button type="button" class="btn btn-primary px-4" (click)="onSubmit()">
                    <i class="mdi mdi-check me-1"></i> Sauvegarder
                </button>
            </div>
        </form>
        <p class="smaller text-muted text-center">
           Les champs marqués d'un <span class="text-danger">*</span> sont obligatoires.
        </p>
    </div>
</div>
