<nav class="navbar default-layout-navbar col-lg-12 col-12 p-0 d-flex flex-row">
  <div class="text-center navbar-brand-wrapper d-flex align-items-center justify-content-start ps-3">
    <a class="navbar-brand brand-logo" href="#"><img src="assets/images/logo.png" alt="logo" /></a>
  </div>

  <div class="navbar-menu-wrapper d-flex align-items-center justify-content-end">
    <button class="navbar-toggler align-self-center" type="button" (click)="onToggleMenu($event)">
      <span class="mdi mdi-menu"></span>
    </button>

    <ul class="navbar-nav navbar-nav-right" *ngIf="user$ | async as user">
      
      <li class="nav-item dropdown me-3">
        <a class="nav-link count-indicator dropdown-toggle" href="javascript:void(0);" (click)="toggleNotifications($event)">
          <i class="mdi mdi-bell-outline fs-4"></i>
          <span class="count-symbol bg-danger" *ngIf="unreadMessagesCount > 0"></span>
        </a>

        <div class="dropdown-menu dropdown-menu-end shadow-lg border-0 custom-notification-dropdown" [class.show]="isNotificationOpen">
          <h6 class="mb-0 text-white text-center fw-bold notification-header">
            {{ unreadMessagesCount > 0 ? 'Nouveaux Messages' : 'Notifications' }}
          </h6>
          <div class="p-3 text-center border-bottom bg-white" *ngIf="unreadMessagesCount > 0">
            <p class="mb-0 text-dark" style="font-size: 0.75rem;">
              Vous avez <strong>{{ unreadMessagesCount }}</strong> message(s).
            </p>
          </div>
          <button class="dropdown-item p-2 text-center bg-light" (click)="resetNotification()" style="font-size: 0.65rem; font-weight: bold;">
            Marquer comme lu
          </button>
        </div>
      </li>
      
      <li class="nav-item nav-profile dropdown" [class.show]="isDropdownOpen">
        <a class="nav-link dropdown-toggle d-flex align-items-center" (click)="toggleDropdown($event)" href="javascript:void(0);">
          <div class="nav-profile-img me-2">
            <div class="rounded-circle d-flex align-items-center justify-content-center text-white profile-initials">
              {{ getInitials(user.full_name) }}
            </div>
          </div>
          <div class="nav-profile-text d-flex align-items-center">
            <p class="mb-0 text-black fw-bold me-1">{{ user.full_name }}</p>
          </div>
        </a>

        <div class="dropdown-menu dropdown-menu-end custom-profile-dropdown border-0" [class.show]="isDropdownOpen">
          <a class="dropdown-item px-3 py-2.5 d-flex align-items-center" routerLink="/profile" (click)="closeDropdown()">
            <i class="mdi mdi-account-outline me-3 text-primary fs-5"></i> 
            <span class="menu-text">Profil</span>
          </a>
          <button class="dropdown-item px-3 py-2.5 d-flex align-items-center logout-item" (click)="logout()">
            <i class="mdi mdi-logout me-3 text-danger fs-5"></i> 
            <span class="menu-text">Déconnexion</span>
          </button>
        </div>
      </li>
    </ul>
  </div>
</nav>
