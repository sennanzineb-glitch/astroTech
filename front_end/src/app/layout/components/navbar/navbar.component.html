<nav class="navbar default-layout-navbar col-lg-12 col-12 p-0 d-flex flex-row">
  <div class="text-center navbar-brand-wrapper d-flex align-items-center justify-content-start">
    <a class="navbar-brand brand-logo" href="#"><img src="assets/images/logo.png" alt="logo" /></a>
    <a class="navbar-brand brand-logo-mini" href="#"><img src="assets/images/logo-mini.svg" alt="logo" /></a>
  </div>

  <div class="navbar-menu-wrapper d-flex align-items-stretch">
    <button class="navbar-toggler navbar-toggler align-self-center" type="button">
      <span class="mdi mdi-menu"></span>
    </button>

    <div class="search-field d-none d-md-block">
      <form class="d-flex align-items-center h-100" action="#">
        <div class="input-group">
          <div class="input-group-prepend bg-transparent">
            <i class="input-group-text border-0 mdi mdi-magnify"></i>
          </div>
          <input type="text" class="form-control bg-transparent border-0" placeholder="Rechercher...">
        </div>
      </form>
    </div>

    <ul class="navbar-nav navbar-nav-right" *ngIf="user$ | async as user">
      <li class="nav-item nav-profile dropdown" [class.show]="isDropdownOpen">
        <a class="nav-link dropdown-toggle d-flex align-items-center" 
           href="javascript:void(0);"
           (click)="toggleDropdown($event)">
          
          <div class="nav-profile-img me-2">
            <div class="rounded-circle d-flex align-items-center justify-content-center text-white shadow-sm profile-initials">
              {{ getInitials(user.full_name) }}
            </div>
          </div>

          <div class="nav-profile-text d-none d-md-block me-1">
            <p class="mb-0 text-black fw-bold" style="font-size: 0.85rem;">{{ user.full_name }}</p>
          </div>
          <i class="mdi mdi-chevron-down text-muted"></i>
        </a>

        <div class="dropdown-menu dropdown-menu-end shadow border-0" [class.show]="isDropdownOpen">
          <h6 class="p-3 mb-0 fw-bold border-bottom">Paramètres</h6>

          <a class="dropdown-item py-2 d-flex align-items-center" routerLink="/profile" (click)="closeDropdown()">
            <i class="mdi mdi-account-outline me-2 text-primary"></i> Mon Profil
          </a>

          <a class="dropdown-item py-2 d-flex align-items-center" routerLink="/profile" (click)="closeDropdown()">
            <i class="mdi mdi-shield-lock-outline me-2 text-success"></i> Sécurité
          </a>

          <div class="dropdown-divider"></div>

          <button class="dropdown-item py-2 d-flex align-items-center" (click)="logout(); closeDropdown()">
            <i class="mdi mdi-logout me-2 text-danger"></i> Déconnexion
          </button>
        </div>
      </li>
    </ul>

    <button class="navbar-toggler navbar-toggler-right d-lg-none align-self-center" type="button">
      <span class="mdi mdi-menu"></span>
    </button>
  </div>
</nav>
