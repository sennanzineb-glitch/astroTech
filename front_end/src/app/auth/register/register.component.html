<div class="auth d-flex align-items-center justify-content-center">
    <div class="auth-form-light p-5 shadow-lg rounded-4" style="max-width: 500px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">AstroTech<span class="text-info">2.0</span></h2>
        </div>
        <h4 class="fw-bold">Créer un compte</h4>
        <h6 class="text-muted mb-4">L'inscription est simple et ne prend que quelques minutes.</h6>
        <form class="pt-3">
            <div class="form-group mb-3">
                <input type="text" class="form-control form-control-lg" placeholder="Nom d'utilisateur">
            </div>
            <div class="form-group mb-3">
                <input type="email" class="form-control form-control-lg" placeholder="Adresse email">
            </div>
            <div class="form-group mb-3">
                <select class="form-select form-select-lg">
                    <option selected disabled>Choisir un pays</option>
                    <option>France</option>
                    <option>Maroc</option>
                    <option>Belgique</option>
                    <option>Suisse</option>
                </select>
            </div>
            <div class="form-group mb-4">
                <input type="password" class="form-control form-control-lg" placeholder="Mot de passe">
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-primary-gradient btn-lg py-3 fw-bold" type="button">S'INSCRIRE</button>
            </div>
            <div class="text-center mt-4 text-muted small">
                Vous avez déjà un compte ? <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Se connecter</a>
            </div>
        </form>
    </div>
</div>
