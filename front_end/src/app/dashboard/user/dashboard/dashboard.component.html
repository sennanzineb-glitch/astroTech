<div class="dashboard-theme-container py-3 px-3">

  <div class="glass-form-card mb-3 animate-fade-in">
    <div class="card-body-custom">
      <div class="row g-2 align-items-center">
        <div class="col-md-5">
          <label class="form-subtitle mb-1 d-block">TABLEAU DE BORD ACTIF</label>
          <select [ngModel]="selectedDashboardId" (ngModelChange)="onDashboardChange($event)" class="custom-glass-select fw-bold text-uppercase">
            <option *ngFor="let db of dashboards" [value]="db.id">
              📊 {{ db.name }}
            </option>
          </select>
        </div>

        <div class="col-md-2"></div>

        <div class="col-md-4">
          <label class="form-subtitle mb-1 d-block">CRÉER UN NOUVEAU TABLEAU</label>
          <input type="text" [(ngModel)]="nouveauDashboardName" class="custom-glass-input" placeholder="Nom du nouveau tableau...">
        </div>
        <div class="col-md-1 pt-4">
          <button class="btn-neon-submit w-100 fw-bold" (click)="ajouterDashboard()">+ CRÉER</button>
        </div>
      </div>
    </div>
  </div>
  <div class="glass-form-card mb-5 animate-fade-in">
    <div class="card-body-custom">
      <div class="form-header d-flex justify-content-between align-items-center mb-2">
        <div>
          <h5 class="form-main-title m-0">Configuration des Vignettes</h5>
          <span class="form-subtitle">CONCEPTION DE L'AFFICHAGE / NOUVEAU WIDGET</span>
        </div>
      </div>

      <div class="row g-2 align-items-center">
        <div class="col-md-2">
          <input type="text" [(ngModel)]="nouveauWidget.title" class="custom-glass-input"
            placeholder="Nom de l'affichage">
        </div>

        <div class="col-md-2">
          <select [(ngModel)]="nouveauWidget.category" class="custom-glass-select" (change)="onConditionChange()">
            <option value="intervention">Intervention</option>
            <option value="affaire" disabled>Affaire</option>
          </select>
        </div>

        <div [ngClass]="nouveauWidget.category === 'intervention' ? 'col-md-2' : 'col-md-4'">
          <select [(ngModel)]="nouveauWidget.display_type" class="custom-glass-select" (change)="onConditionChange()">
            <option value="number">Nombre</option>
            <option value="pie">Diagramme circulaire</option>
            <option value="bar">Histogramme</option>
            <option value="line">Nuage de points / Ligne</option>
          </select>
        </div>

        <div class="col-md-4"
          *ngIf="nouveauWidget.category === 'intervention' && nouveauWidget.display_type === 'number'">
          <select [(ngModel)]="nouveauWidget.data_type" class="custom-glass-select fw-bold">
            <option value="all" selected>Toutes les interventions</option>
            <option value="technicien">Total des Techniciens (Global)</option>
            <option *ngFor="let type of interventionTypes" [value]="type.id">
              Type: {{ type.libelle }} {{ type.categorie ? '(' + type.categorie + ')' : '' }}
            </option>
          </select>
        </div>

        <div class="col-md-4"
          *ngIf="nouveauWidget.category === 'intervention' && nouveauWidget.display_type !== 'number'">
          <select [(ngModel)]="nouveauWidget.data_type" class="custom-glass-select fw-bold">
            <option value="client">Client</option>
            <option value="zone">Zone d'intervention (Agence)</option>
            <option value="technicien">Techniciens (Équipes)</option>
            <option value="technicien_prevu">Techniciens prévus (Membres)</option>
            <option value="etat">Statut / État</option>
            <option value="referent">Référents</option>
            <option value="createur">Créateur</option>
            <option value="type">Type d'intervention</option>
            <option value="date_creation">Date de création</option>
            <option value="date_intervention">Date d'intervention</option>
            <option value="date_prevue">Date d'intervention prévue</option>
          </select>
        </div>

        <div class="col-md-1 d-flex justify-content-center">
          <div class="color-picker-wrapper">
            <input type="color" [(ngModel)]="nouveauWidget.color" class="custom-color-input"
              title="Choisir une couleur">
          </div>
        </div>

        <div [ngClass]="nouveauWidget.category === 'intervention' ? 'col-md-1' : 'col-md-2'">
          <button class="btn-neon-submit w-100 fw-bold" (click)="creerWidget()">SUIVANT</button>
        </div>
      </div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div *ngFor="let widget of widgets" class="grid-item"
      [ngClass]="widget.display_type === 'number' ? 'size-small' : 'size-large'">

      <div class="modern-widget-card" [style.backgroundColor]="widget.color">
        <div class="widget-color-bar" [style.backgroundColor]="widget.color"></div>

        <div class="widget-badge-ribbon">
          <div class="ribbon-circle" [style.backgroundColor]="widget.color"></div>
        </div>

        <button type="button" class="widget-close-btn" aria-label="Supprimer" (click)="supprimerWidget(widget.id)">
          &times;
        </button>

        <div class="widget-inner-body">
          <div class="widget-header-row">
            <div class="widget-title-group">
              <span class="main-w-title" [title]="widget.title">{{ widget.title }}</span>
              <span class="sub-w-category">{{ widget.category }}</span>
            </div>
          </div>

          <div class="widget-content-area">
            <div *ngIf="!widget.id || !statsData[widget.id]" class="spinner-border spinner-border-sm text-info" role="status"></div>

            <ng-container *ngIf="widget.id && statsData[widget.id]">
              <div *ngIf="widget.display_type === 'number'" class="digital-number-display">
                {{ statsData[widget.id]?.value ?? '0' }}
              </div>

              <div *ngIf="widget.display_type !== 'number'" class="chart-container-wrapper">
                <app-dashboard-chart
                  [type]="widget.display_type === 'pie' ? 'pie' : (widget.display_type === 'bar' ? 'bar' : 'line')"
                  [data]="getChartData(widget.id)">
                </app-dashboard-chart>
              </div>
            </ng-container>
          </div>

          <div class="widget-footer-row">
            <span class="live-status-dot"></span> En temps réel
          </div>
        </div>
      </div>

    </div>
  </div>

</div>
