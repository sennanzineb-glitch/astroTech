<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h3 class="fw-bold mb-1">Nouvelle Intervention</h3>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a routerLink="/dashboard">Home</a></li>
        <li class="breadcrumb-item"><a routerLink="/interventions/list">Interventions</a></li>
        <li class="breadcrumb-item active">Nouveau</li>
      </ol>
    </nav>
  </div>
</div>

<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-white py-4 border-0 text-center">
                <h4 class="fw-bold mb-1">Méthode de création</h4>
                <p class="text-muted mb-0">Comment souhaitez-vous créer cette intervention ?</p>
            </div>

            <div class="card-body p-4 pt-0">
                <div class="row g-4">
                    <!-- Option rapide -->
                    <div class="col-md-6">
                        <label class="w-100 cursor-pointer">
                            <input type="radio" name="typeCreation" value="rapide" [(ngModel)]="typeCreation" hidden />
                            <div class="p-4 border rounded-4 text-center transition" [class.border-primary]="typeCreation === 'rapide'" [class.bg-primary-subtle]="typeCreation === 'rapide'">
                                <div class="avatar-circle-lg bg-primary text-white mx-auto mb-3">
                                    <i class="mdi mdi-lightning-bolt"></i>
                                </div>
                                <h6 class="fw-bold mb-2">Création libre</h6>
                                <p class="mb-0 text-muted smaller">Indépendante de toute affaire existante.</p>
                            </div>
                        </label>
                    </div>

                    <!-- Option affaire -->
                    <div class="col-md-6">
                        <label class="w-100 cursor-pointer">
                            <input type="radio" name="typeCreation" value="affaire" [(ngModel)]="typeCreation" hidden />
                            <div class="p-4 border rounded-4 text-center transition" [class.border-success]="typeCreation === 'affaire'" [class.bg-success-subtle]="typeCreation === 'affaire'">
                                <div class="avatar-circle-lg bg-success text-white mx-auto mb-3">
                                    <i class="mdi mdi-folder-plus"></i>
                                </div>
                                <h6 class="fw-bold mb-2">Liée à une Affaire</h6>
                                <p class="mb-0 text-muted smaller">Rattacher à un dossier client existant.</p>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="mt-5 d-flex justify-content-center">
                    <button class="btn btn-primary px-5 py-2 shadow-sm" [disabled]="!typeCreation" (click)="continuer()">
                        Suivant <i class="mdi mdi-arrow-right ms-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
