<!-- ================= HEADER ================= -->
<div class="page-header mb-3">
  <h3 class="page-title">Intervention</h3>
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item">
        <a [routerLink]="['/interventions/list']">Intervention</a>
      </li>
      <li class="breadcrumb-item active">Liste des interventions</li>
    </ol>
  </nav>
</div>

<!-- ================= AJOUT INTERVENTION ================= -->
<button class="btn btn-sm btn-gradient-success btn-sm mb-2 row" (click)="goToAddIntervention()">
  ➕ Nouvelle intervention
</button>

<!-- ================= RECHERCHE ================= -->
<div class="mb-2 position-relative w-50 row">
  <input type="text" class="form-control ps-5 form-control-sm" placeholder="Rechercher ..." [(ngModel)]="searchTerm"
    (keyup)="searchInterventions()" />
  <span class="position-absolute top-50 start-0 translate-middle-y ps-3 text-muted">
    🔍
  </span>
</div>

<!-- ================= LISTE ================= -->
<div class="row">
  <div class="card" *ngIf="interventions.length">
    <div class="card-body">

      <table class="table table-striped text-center">
        <thead>
          <tr>
            <th>#</th>
            <th>Titre</th>
            <th>Type</th>
            <th>État</th>
            <th>Date création</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let i of interventions">

            <td>{{ i.numero }}</td>
            <td>{{ i.titre }}</td>
            <td>{{ i.type_intervention }}</td>
            <td>
              <!-- Badge circulaire avec icône seule -->
              <span class="badge rounded-circle d-inline-flex align-items-center justify-content-center"
                [ngClass]="getBadgeClass(i.etat)" style="width: 30px; height: 30px;">
                <i [ngClass]="['fs-6', getEtatIcon(i.etat)]"></i>
              </span>
            </td>
            <td>{{ i.date_creation | date:'dd/MM/yyyy' }}</td>

            <td class="text-center">
              <button class="btn btn-sm btn-light me-2" (click)="duplicate(i)">
                <i class="fa fa-copy"></i>
              </button>

              <button class="btn btn-sm btn-light me-2" (click)="onSelectIntervention(i); $event.stopPropagation()">
                <i class="fa fa-calendar"></i>
              </button>

              <button class="btn btn-sm btn-primary me-2" (click)="openDetail(i.id); $event.stopPropagation()">
                <i class="fa fa-eye"></i>
              </button>

              <button class="btn btn-sm btn-warning me-2" (click)="editIntervention(i.id); $event.stopPropagation()">
                <i class="fa fa-pencil"></i>
              </button>

              <button class="btn btn-sm btn-danger" (click)="deleteIntervention(i.id); $event.stopPropagation()">
                <i class="fa fa-trash-o"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Légende des états sous le tableau -->
      <div class="mt-3 d-flex flex-wrap gap-3">
        <div class="text-center" *ngFor="let etat of etatsConfig">
          <span class="badge rounded-circle d-inline-flex align-items-center justify-content-center"
            [ngClass]="etat.class" style="width: 30px; height: 30px;">
            <i [class]="etat.icon"></i>
          </span>
          <div class="text-muted mt-1" style="font-size: 11px;">
            {{ etat.label }}
          </div>
        </div>
      </div>


      <!-- Pagination -->
      <nav *ngIf="totalPages > 1" class="mt-3">
        <ul class="pagination justify-content-center">
          <li class="page-item" [class.disabled]="currentPage === 1">
            <button class="page-link" (click)="changePage(currentPage - 1)">Précédent</button>
          </li>
          <li class="page-item" *ngFor="let page of pages" [class.active]="page === currentPage">
            <button class="page-link" (click)="changePage(page)">{{ page }}</button>
          </li>
          <li class="page-item" [class.disabled]="currentPage === totalPages">
            <button class="page-link" (click)="changePage(currentPage + 1)">Suivant</button>
          </li>
        </ul>
      </nav>

    </div>
  </div>

  <div *ngIf="!interventions.length" class="alert alert-secondary text-center">
    🛠️ Aucune intervention trouvée.
  </div>
</div>

<!-- Inclusion du composant modal-save -->
<app-modal-save 
  #modalSave>
</app-modal-save>
