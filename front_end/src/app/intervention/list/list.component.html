<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h3 class="fw-bold mb-1">Interventions</h3>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a routerLink="/dashboard">Home</a></li>
        <li class="breadcrumb-item active">Interventions</li>
      </ol>
    </nav>
  </div>
  <button class="btn btn-primary" (click)="goToAddIntervention()">
    <i class="mdi mdi-plus me-2"></i> Nouvelle intervention
  </button>
</div>

<!-- ================= RECHERCHE ================= -->
<div class="card mb-4">
  <div class="card-body py-3">
    <div class="position-relative" style="max-width: 400px;">
      <input type="text" class="form-control ps-5" placeholder="Rechercher une intervention..." [(ngModel)]="searchTerm"
        (keyup)="searchInterventions()" />
      <span class="position-absolute top-50 start-0 translate-middle-y ps-3 text-muted">
        <i class="mdi mdi-magnify fs-4"></i>
      </span>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-12">
    <div class="card" *ngIf="interventions.length">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th class="ps-4">#</th>
                <th>Titre</th>
                <th>Type</th>
                <th>État</th>
                <th>Date création</th>
                <th class="text-center pe-4">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let i of interventions">
                <td class="ps-4 fw-semibold text-primary">{{ i.numero }}</td>
                <td class="fw-medium">{{ i.titre }}</td>
                <td><span class="text-secondary small fw-bold text-uppercase">{{ i.type }}</span></td>
                <td>
                  <span class="badge rounded-pill px-3 py-2" [ngClass]="getBadgeClass(i.etat)">
                    <i [class]="getEtatIcon(i.etat) + ' me-1'"></i>
                    {{ i.etat || '—' }}
                  </span>
                </td>
                <td class="text-muted">{{ i.date_creation | date:'dd/MM/yyyy' }}</td>
                <td class="text-center pe-4">
                  <div class="btn-group">
                    <button class="btn btn-sm btn-light me-1" (click)="openDetail(i.id)" title="Détails">
                      <i class="mdi mdi-eye text-primary"></i>
                    </button>
                    <button class="btn btn-sm btn-light me-1" (click)="editIntervention(i.id)" title="Modifier">
                      <i class="mdi mdi-pencil text-warning"></i>
                    </button>
                    <button class="btn btn-sm btn-light" (click)="deleteIntervention(i.id)" title="Supprimer">
                      <i class="mdi mdi-delete text-danger"></i>
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ================= PAGINATION ================= -->
    <nav *ngIf="totalPages > 1" class="mt-3">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <button class="page-link" (click)="changePage(currentPage - 1)">Précédent</button>
        </li>
        <li class="page-item" *ngFor="let page of pages" [class.active]="page === currentPage">
          <button class="page-link" (click)="changePage(page)">{{ page }}</button>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <button class="page-link" (click)="changePage(currentPage + 1)">Suivant</button>
        </li>
      </ul>
    </nav>

    <div *ngIf="!interventions.length" class="alert alert-secondary text-center">
      🛠️ Aucune intervention trouvée pour le moment. Vous pouvez en créer une nouvelle.
    </div>
  </div>
</div>
