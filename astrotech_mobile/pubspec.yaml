name: astrotech_mobile
description: AstroTech Technician Mobile App - Manage interventions with offline support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.3.3
  connectivity_plus: ^5.0.1

  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Camera/Images
  image_picker: ^1.0.4
  image: ^4.1.3

  # Signature
  signature: ^5.4.1

  # Background Sync
  workmanager: ^0.9.0

  # DI
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1
  json_annotation: ^4.8.1
  cached_network_image: ^3.3.0
  permission_handler: ^11.1.0
  geolocator: ^10.1.0
  path: ^1.8.3

  # UI
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true

  # Uncomment if you add images to assets/images/
  # assets:
  #   - assets/images/
