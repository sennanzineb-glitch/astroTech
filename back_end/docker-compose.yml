version: '3.8'

services:
  db:
    image: mysql:latest
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "123456789"
      MYSQL_DATABASE: astro_tech
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_container
    restart: always
    environment:
      PMA_HOST: db
    ports:
      - "8080:80"
    depends_on:
      - db

  client_api:
    build: ./client_api
    container_name: client_api_container
    ports:
      - "3001:3001"
    depends_on:
      - db
    environment:
      PORT: 3001
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: "123456789"
      DB_NAME: astro_tech
      EMAIL_HOST: smtp.ethereal.email
      EMAIL_PORT: 587
      EMAIL_USER: zena.windler@ethereal.email
      EMAIL_PASS: j3U2kSVSJgh2
      FRONTEND_URL: http://localhost:4200

  fichier_api:
    build: ./fichier_api
    container_name: fichier_api_container
    ports:
      - "3002:3002"
    volumes:
      - ./fichier_api/uploads:/app/uploads
    depends_on:
      - db
    environment:
      PORT: 3002
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: "123456789"
      DB_NAME: astro_tech

  referent_api:
    build: ./referent_api
    container_name: referent_api_container
    ports:
      - "3003:3003"
    depends_on:
      - db
    environment:
      PORT: 3003
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: "123456789"
      DB_NAME: astro_tech

  technicien_api:
    build: ./technicien_api
    container_name: technicien_api_container
    ports:
      - "3004:3004"
    depends_on:
      - db
    environment:
      PORT: 3004
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: "123456789"
      DB_NAME: astro_tech

  affaires_api:
    build: ./affaires_api
    container_name: affaires_api_container
    ports:
      - "3005:3005"
    depends_on:
      - db
    environment:
      PORT: 3005
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: "123456789"
      DB_NAME: astro_tech
    volumes:
      - ./affaires_api:/app
      - ./client_api:/app/client_api

  chat_api:
    build: ./chat_api
    container_name: chat_api_container
    ports:
      - "3006:3006"
    depends_on:
      - db
    environment:
      PORT: 3006
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: "123456789"
      DB_NAME: astro_tech
    # 🔥 CORRECTION : Montage de volumes pour faire apparaître les fichiers audio enregistrés sur ton PC
    volumes:
      - ./chat_api:/app
      - ./chat_api/public:/app/public
      - /app/node_modules

  user_api:
    build: ./user_api
    container_name: user_api_container
    ports:
      - "3007:3007"
    depends_on:
      - db
    environment:
      PORT: 3007
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: "123456789"
      DB_NAME: astro_tech

  dashboard_api:
    build: ./dashboard_api
    container_name: dashboard_api_container
    ports:
      - "3008:3008"
    depends_on:
      - db
    environment:
      PORT: 3008
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: "123456789"
      DB_NAME: astro_tech

volumes:
  db_data:
    driver: local